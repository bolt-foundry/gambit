name: ci

on:
  push:
    branches: ["main", "master"]
    paths-ignore:
      - packages/gambit-core/**
  pull_request:
    branches: ["*"]
    paths-ignore:
      - packages/gambit-core/**

jobs:
  test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write
    env:
      NIX_DEV_PROFILE: ${{ github.workspace }}/.nix-profiles/ci
      DENO_DIR: /home/runner/.cache/deno
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/deno-ci-setup
        with:
          nix_dev_profile: ${{ env.NIX_DEV_PROFILE }}
          deno_dir: ${{ env.DENO_DIR }}

      - name: CI parity suite
        run: |
          nix develop --profile "$NIX_DEV_PROFILE" --command bash scripts/ci_downstream_parity.sh
      - uses: ./.github/actions/deno-ci-cleanup
        if: always()
